services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--quiet', '--eval', "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  server:
    build: ./server
    restart: unless-stopped
    # Server is reached from the browser through the nginx client container on :8080.
    # Uncomment to expose it directly on the host for debugging.
    # ports:
    #   - '8081:8081'
    expose:
      - '8081'
    depends_on:
      mongo:
        condition: service_healthy
    env_file:
      - path: ./server/.env
        required: false
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://mongo:27017/hypertube
      - PORT=8081
      # Same-origin via nginx in the client container — no cross-origin calls from the browser.
      - CORS_ORIGINS=http://localhost:8080
    volumes:
      - server-downloads:/app/downloads

  client:
    build: ./client
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - server

volumes:
  mongo-data:
  server-downloads:
